name: Claude Source Discovery

# Replaces the account-scheduled "Daily source discovery" routine.
# Runs skills/source-discovery/SKILL.md steps 1-5 (discovery + candidate
# triage only) and records candidates under docs/source-candidates/.

on:
  schedule:
    - cron: "30 8 * * *" # Daily, morning UTC
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: claude-source-discovery
  cancel-in-progress: false

jobs:
  discover:
    # Skips silently on template copies that haven't set the OAuth token.
    if: ${{ github.repository == 'crowecawcaw/832events' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The source-discovery skill is built around web search/fetch (step 3)
          # and Bash scripts (e.g. dead-sources.py, npm builds). claude-code-action
          # denies Bash/WebSearch/WebFetch by default — without this allowlist the
          # run loops on permission denials, burns tokens, and exits in error.
          claude_args: '--max-turns 80 --allowedTools "Bash,WebSearch,WebFetch,Read,Edit,Write,Glob,Grep,TodoWrite"'
          prompt: |
            Read skills/source-discovery/SKILL.md and follow steps 1-5
            (discovery and candidate triage only - do not implement a source).
            Record new candidates under docs/source-candidates/ and append
            today's discovery log under docs/discovery-log/, then open a PR.

            This run produces ONLY markdown (candidate files and the
            discovery log) — reference data with no build or test risk. So
            this PR is self-merging: review your own markdown changes
            carefully for accuracy, write a clear PR summary, then
            SQUASH-MERGE the PR yourself. Do not wait for CI or human review
            (neither runs on this PR anyway — it is opened from GitHub Actions
            with the default token). If you cannot merge for any reason, leave
            the PR open with a summary and stop; do not force it.

            Note: this self-merge applies to discovery ONLY because the output
            is markdown. The source-implementation workflow, which writes real
            code, still opens a PR for human review and must NOT self-merge.

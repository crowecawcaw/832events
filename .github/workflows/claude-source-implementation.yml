name: Claude Source Implementation

# Replaces the account-scheduled "Daily source implementation" routine.
# Picks the highest-confidence candidate from docs/source-candidates/ and
# implements it as a PR (skills/source-discovery/SKILL.md from step 6).
# Offset a few hours after discovery so fresh candidates are available.

on:
  schedule:
    - cron: "30 14 * * *" # Daily, afternoon UTC (after discovery)
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: claude-source-implementation
  cancel-in-progress: false

jobs:
  implement:
    if: ${{ github.repository == 'crowecawcaw/832events' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 120"
          prompt: |
            Read skills/source-discovery/SKILL.md and follow it from step 6:
            pick the highest-confidence existing candidate in
            docs/source-candidates/ and implement that one source as a PR. Do
            not run the discovery scan. Follow the quality gates and the
            AGENTS.md development workflow.

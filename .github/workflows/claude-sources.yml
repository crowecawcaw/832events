name: Claude Source Pipeline

# One daily run that does both halves of the source pipeline in a single
# session: discover new candidates (skills/source-discovery/SKILL.md steps
# 1-5) and then implement the highest-confidence one (steps 6-8).
#
# Discovery hands its markdown to the implementation half in-session —
# nothing is committed to main directly, and there is no throwaway PR. The
# whole run produces ONE human-review PR that carries the discovery markdown
# (candidate files + discovery log) alongside the source code.

on:
  schedule:
    - cron: "30 8 * * *" # Daily, morning UTC
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: claude-sources
  cancel-in-progress: false

jobs:
  sources:
    # Skips silently on template copies that haven't set the OAuth token.
    if: ${{ github.repository == 'crowecawcaw/832events' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Both halves need web search/fetch (discovery) and Bash for the
          # dead-source script, npm builds, tests, and git. claude-code-action
          # denies Bash/WebSearch/WebFetch by default — without this allowlist
          # the run loops on permission denials and burns tokens.
          claude_args: '--max-turns 160 --allowedTools "Bash,WebSearch,WebFetch,Read,Edit,Write,Glob,Grep,TodoWrite"'
          prompt: |
            You run the full source pipeline in one session and hand the
            result of each phase to the next. Nothing is committed to main
            directly and there is no throwaway PR — the whole run produces
            ONE PR for human review.

            PHASE 1 — Discovery (skills/source-discovery/SKILL.md steps 1-5).
            Scan for new sources, quality-gate them, write candidate files
            under docs/source-candidates/, append today's discovery log under
            docs/discovery-log/, and flag dead sources. Leave these markdown
            changes in the working tree — do NOT commit or push them on their
            own. Carry the candidates you found forward into Phase 2.

            PHASE 2 — Implementation (skills/source-discovery/SKILL.md from
            step 6). Pick the highest-confidence candidate from Phase 1 (or an
            existing pending candidate) and implement that ONE source,
            flipping its candidate file's status frontmatter. Because a
            bot-opened PR does not trigger CI or the automated Claude Code
            Review, self-validate IN THIS SESSION before opening the PR:
              1. ONLY_SOURCE=<source> npm run generate-calendars — confirm a
                 sane number of events with no errors.
              2. npm run test:all
              3. /code-review on your working-tree diff; address its findings.
            Then open ONE PR for HUMAN REVIEW that contains BOTH the Phase 1
            markdown (discovery log + all candidate files) AND the source
            code. Do NOT push to main and do NOT self-merge; the repo owner
            reviews and merges it. Write a summary listing what you
            discovered and what you validated.

            If Phase 1 turns up nothing worth implementing and no pending
            candidate exists, open a markdown-only PR with the discovery
            log / candidate / dead-source updates for human review, then stop.

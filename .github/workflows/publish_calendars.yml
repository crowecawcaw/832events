name: Generate Calendars and Publish to GitHub Pages

on:
  schedule:
    - cron: "0 0 * * *" # Daily
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering
    inputs:
      force_routine:
        description: "Bypass the 24h rate limit on the Claude build-error responder"
        type: boolean
        default: false

jobs:
  jitter:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Random jitter (up to 3 hours)
        run: sleep $((RANDOM % 10800))

  build:
    needs: [jitter]
    if: always() && (needs.jitter.result == 'success' || needs.jitter.result == 'skipped')
    uses: ./.github/workflows/build-calendars.yml
    permissions:
      id-token: write    # OIDC token for AWS proxy authentication
      contents: read
    secrets: inherit

  check-errors:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Check Error Count
      env:
        ERROR_COUNT: ${{ needs.build.outputs.error-count }}
      # Fail this if we have a positive error count.
      # This way we keep publishing our calendars even if there are errors, but we get a notification from this failed step
      run: (( $ERROR_COUNT == 0 ))

  deploy:
    # Always run this deploy, even if the build failed. This is so we get newest results even if a calendar had errors
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: cf-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: output

      - name: Deploy to Cloudflare Pages
        # CLOUDFLARE_PAGES_PROJECT repo var overrides the project name for
        # template copies; defaults to the reference instance's project.
        run: npx wrangler pages deploy output/ --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || '832events' }} --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  build-error-responder:
    # Run the Claude Code action to investigate and fix build errors, in place
    # of the former account-scheduled "build-error responder" routine.
    # Runs on any build with errors (push, schedule, or manual dispatch).
    # Does NOT run on PRs (this workflow doesn't trigger on PRs).
    # Skips if CLAUDE_CODE_OAUTH_TOKEN is not configured (as a secret).
    # Rate-limited to at most once per rolling 24h window via the Actions cache.
    # A workflow_dispatch run with force_routine=true bypasses the rate limit.
    if: always() && needs.build.outputs.error-count != '' && needs.build.outputs.error-count != '0'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      # Cache keys are immutable, so each successful run writes a new entry under
      # a unique per-run key. The restore step uses a prefix match to recover the
      # most-recently-created entry, which sidesteps the need to delete the old one.
      RATE_LIMIT_CACHE_PREFIX: claude-routine-last-fired-v1-
      RATE_LIMIT_FILE: /tmp/claude-routine-last-fired
      RATE_LIMIT_WINDOW_SECONDS: "86400"
    steps:
      - name: Check Claude config
        id: check-config
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: CLAUDE_CODE_OAUTH_TOKEN not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Restore last-fired timestamp
        if: steps.check-config.outputs.skip != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.RATE_LIMIT_FILE }}
          # The exact key will never match (it includes the current run id),
          # so the action falls through to the restore-keys prefix and returns
          # the most-recently-created cache entry under that prefix.
          key: ${{ env.RATE_LIMIT_CACHE_PREFIX }}${{ github.run_id }}
          restore-keys: |
            ${{ env.RATE_LIMIT_CACHE_PREFIX }}

      - name: Check rate limit
        id: rate-limit
        if: steps.check-config.outputs.skip != 'true'
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_routine == true }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "Manual dispatch with force_routine=true; bypassing rate limit"
            echo "should-fire=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -s "$RATE_LIMIT_FILE" ]; then
            echo "No prior run recorded; will run"
            echo "should-fire=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST=$(cat "$RATE_LIMIT_FILE")
          if ! [[ "$LAST" =~ ^[0-9]+$ ]]; then
            echo "Cached timestamp is not numeric ('$LAST'); treating as never run"
            echo "should-fire=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NOW=$(date +%s)
          ELAPSED=$(( NOW - LAST ))
          if [ "$ELAPSED" -lt "$RATE_LIMIT_WINDOW_SECONDS" ]; then
            HOURS=$(( ELAPSED / 3600 ))
            echo "::notice::Rate-limited: Claude build-error responder last ran ${HOURS}h ago (window: 24h). Skipping."
            echo "should-fire=false" >> "$GITHUB_OUTPUT"
          else
            HOURS=$(( ELAPSED / 3600 ))
            echo "Last run was ${HOURS}h ago; will run"
            echo "should-fire=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        id: checkout
        if: steps.check-config.outputs.skip != 'true' && steps.rate-limit.outputs.should-fire == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code build-error responder
        id: fire
        if: steps.check-config.outputs.skip != 'true' && steps.rate-limit.outputs.should-fire == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 120"
          prompt: |
            A daily build finished with ${{ needs.build.outputs.error-count }}
            error(s) (commit ${{ github.sha }}, run
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
            Read skills/build-report/SKILL.md and follow it completely to
            triage and fix the errors, opening PR(s) per the AGENTS.md
            development workflow.

      - name: Record new last-run timestamp
        if: steps.fire.outcome == 'success'
        run: date +%s > "$RATE_LIMIT_FILE"

      - name: Save new last-run timestamp
        if: steps.fire.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.RATE_LIMIT_FILE }}
          # Unique per-run key so we never collide with a prior entry. Older
          # entries are unreachable once a newer one exists (restore-keys picks
          # the newest) and expire naturally after 7 days of no access.
          key: ${{ env.RATE_LIMIT_CACHE_PREFIX }}${{ github.run_id }}
